<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruby Cafe | Menü</title>
    <style>
        :root { --ruby: #1b4332; --bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg); color: var(--ruby); margin: 0; padding-bottom: 90px; }
        header { background: var(--ruby); color: white; padding: 25px; text-align: center; border-radius: 0 0 30px 30px; }
        .cat-title { padding: 12px; margin-top: 15px; background: #eee; font-weight: bold; border-left: 5px solid var(--ruby); }
        .product { background: white; margin: 10px; border-radius: 12px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; }
        .product img { width: 80px; height: 80px; object-fit: cover; }
        .product-info { padding: 10px; flex: 1; }
        .add-btn { background: var(--ruby); color: white; border: none; border-radius: 15px; padding: 6px 12px; float: right; }
        #cart-bar { position: fixed; bottom: 0; width: 100%; background: var(--ruby); color: white; padding: 20px; text-align: center; font-weight: bold; cursor: pointer; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 1000; overflow-y: auto; }
        .modal-h { background: var(--ruby); color: white; padding: 15px; display: flex; justify-content: space-between; }
        .c-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<header><h1>RUBY CAFE</h1></header>
<div id="menu-area"></div>

<div id="cart-bar" onclick="showCart(true)">🛒 Siparişi Tamamla (<span id="count">0</span>)</div>

<div id="cart-modal" class="modal">
    <div class="modal-h"><h3>Sepetiniz</h3><button onclick="showCart(false)" style="color:white; background:none; border:none; font-size:25px;">✕</button></div>
    <div id="cart-list"></div>
    <div style="padding: 20px;">
        <label><b>Masa Seçiniz:</b></label>
        <select id="tableNo" style="width:100%; padding:12px; margin:10px 0; border-radius:8px;">
            <script>for(let i=1; i<=50; i++) document.write(`<option value="${i}">Masa ${i}</option>`);</script>
        </select>
        <button onclick="sendOrder()" style="width:100%; padding:15px; background:var(--ruby); color:white; border:none; border-radius:10px; font-weight:bold;">SİPARİŞİ ONAYLA</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyARo0wIxjep0jYSr-jxnz4sUlZCao2eBCQ",
        authDomain: "rubycafemenu.firebaseapp.com",
        projectId: "rubycafemenu",
        storageBucket: "rubycafemenu.firebasestorage.app",
        messagingSenderId: "770833665554",
        appId: "1:770833665554:web:ac4d20f20ad3c2e93d52cb",
        measurementId: "G-0LFDSHD923"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let cart = [];

    onSnapshot(collection(db, "menu"), (snap) => {
        const area = document.getElementById('menu-area');
        const groups = {};
        snap.forEach(d => {
            const p = d.data();
            if(!groups[p.category]) groups[p.category] = [];
            groups[p.category].push(p);
        });
        area.innerHTML = "";
        for(let cat in groups) {
            area.innerHTML += `<div class="cat-title">${cat}</div>`;
            groups[cat].forEach(p => {
                area.innerHTML += `<div class="product"><img src="${p.image}"><div class="product-info"><b>${p.name}</b><button class="add-btn" onclick="add('${p.name}')">Ekle +</button></div></div>`;
            });
        }
    });

    window.add = (n) => { cart.push(n); renderCart(); };
    window.renderCart = () => {
        document.getElementById('count').innerText = cart.length;
        const l = document.getElementById('cart-list');
        l.innerHTML = "";
        cart.forEach((item, i) => { l.innerHTML += `<div class="c-item"><span>${item}</span><button onclick="remove(${i})" style="color:red; border:none; background:none;">Sil</button></div>`; });
    };
    window.remove = (i) => { cart.splice(i, 1); renderCart(); };
    window.showCart = (s) => { document.getElementById('cart-modal').style.display = s ? 'block' : 'none'; };
    
    window.sendOrder = async () => {
        if(cart.length === 0) return alert("Sepet boş!");
        const t = document.getElementById('tableNo').value;
        await addDoc(collection(db, "orders"), { items: cart, table: t, timestamp: Date.now() });
        alert("Sipariş Masaya İletildi!");
        cart = []; renderCart(); showCart(false);
    };
</script>
</body>
</html>
