<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruby Cafe | Menü</title>
    <style>
        :root { --ruby-green: #1b4332; --soft-white: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--soft-white); color: var(--ruby-green); margin: 0; padding-bottom: 80px; }
        header { background: var(--ruby-green); color: white; padding: 30px; text-align: center; border-radius: 0 0 40px 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .category-title { padding: 15px; margin-top: 20px; border-left: 6px solid var(--ruby-green); background: #e9ecef; font-weight: bold; }
        .product-card { background: white; margin: 15px; border-radius: 15px; overflow: hidden; display: flex; box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: relative; }
        .product-card img { width: 100px; height: 100px; object-fit: cover; }
        .product-info { padding: 15px; flex: 1; }
        .add-btn { background: var(--ruby-green); color: white; border: none; border-radius: 20px; padding: 8px 15px; position: absolute; right: 10px; bottom: 10px; }
        
        /* Sepet Alanı */
        #cart-bar { position: fixed; bottom: 0; width: 100%; background: var(--ruby-green); color: white; padding: 15px; text-align: center; font-weight: bold; cursor: pointer; z-index: 100; }
        .cart-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 200; overflow-y: auto; }
        .cart-header { background: var(--ruby-green); color: white; padding: 20px; display: flex; justify-content: space-between; }
        .cart-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; }
        .remove-btn { color: #e63946; font-weight: bold; border: none; background: none; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; letter-spacing: 2px;">RUBY CAFE</h1>
    <p style="opacity: 0.8;">Taze, Doğal ve Kaliteli</p>
</header>

<div id="menu-area"></div>

<div id="cart-bar" onclick="toggleCart(true)">
    🛒 Sepete Git (<span id="cart-count">0</span> Ürün)
</div>

<div id="cart-modal" class="cart-modal">
    <div class="cart-header">
        <h2>Sepetiniz</h2>
        <button onclick="toggleCart(false)" style="background:none; border:none; color:white; font-size: 24px;">✕</button>
    </div>
    <div id="cart-items-list"></div>
    <div style="padding: 20px;">
        <button onclick="confirmOrder()" style="width: 100%; padding: 15px; background: var(--ruby-green); color: white; border: none; border-radius: 10px; font-size: 18px;">Siparişi Onayla</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // BURAYA KENDİ CONFIG BİLGİLERİNİ YAPIŞTIR
    const firebaseConfig = {
        apiKey: "AIza...", 
        authDomain: "ruby-...", 
        projectId: "ruby-...", 
        storageBucket: "ruby-...", 
        messagingSenderId: "...", 
        appId: "...",
        measurementId: "..."
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let cart = [];

    // Menüyü Getir
    onSnapshot(collection(db, "menu"), (snapshot) => {
        const menuArea = document.getElementById('menu-area');
        const items = {};
        snapshot.forEach(doc => {
            const p = doc.data();
            if(!items[p.category]) items[p.category] = [];
            items[p.category].push(p);
        });

        menuArea.innerHTML = "";
        for(let cat in items) {
            menuArea.innerHTML += `<div class="category-title">${cat}</div>`;
            items[cat].forEach(p => {
                menuArea.innerHTML += `
                    <div class="product-card">
                        <img src="${p.image}" alt="${p.name}">
                        <div class="product-info">
                            <h3>${p.name}</h3>
                            <button class="add-btn" onclick="addToCart('${p.name}')">Ekle +</button>
                        </div>
                    </div>`;
            });
        }
    });

    // Sepet Fonksiyonları
    window.addToCart = (name) => {
        cart.push(name);
        updateCartUI();
    };

    window.updateCartUI = () => {
        document.getElementById('cart-count').innerText = cart.length;
        const list = document.getElementById('cart-items-list');
        list.innerHTML = "";
        cart.forEach((item, index) => {
            list.innerHTML += `
                <div class="cart-item">
                    <span>${item}</span>
                    <button class="remove-btn" onclick="removeFromCart(${index})">SİL</button>
                </div>`;
        });
    };

    window.removeFromCart = (index) => {
        cart.splice(index, 1);
        updateCartUI();
    };

    window.toggleCart = (show) => {
        document.getElementById('cart-modal').style.display = show ? 'block' : 'none';
    };

    window.confirmOrder = async () => {
    if(cart.length === 0) return alert("Sepetiniz boş!");
    
    try {
        await addDoc(collection(db, "orders"), {
            items: cart,
            timestamp: Date.now(),
            status: "new"
        });
        alert("Siparişiniz başarıyla mutfağa iletildi!");
        cart = [];
        updateCartUI();
        toggleCart(false);
    } catch (e) {
        alert("Hata oluştu, lütfen garsona bildiriniz.");
    }
};
    
    };
</script>
</body>
</html>
